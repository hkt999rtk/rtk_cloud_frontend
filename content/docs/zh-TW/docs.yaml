Realtek Connect+ 保持第一版文件首頁精簡，同時讓更深入的文件章節繼續沿用既有 catalog 與伺服器端渲染。

![文件架構預覽](/static/assets/connectplus-platform-surfaces.jpg)

這個來源檔驅動的頁面讓團隊能迭代文件首頁內容，而不需要在同一個版本中遷移功能頁或詳細文件頁。
