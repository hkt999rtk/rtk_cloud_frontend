Realtek Connect+ 保持第一版文档首页精简，同时让更深入的文档章节继续沿用既有 catalog 与服务器端渲染。

![文档架构预览](/static/assets/connectplus-platform-surfaces.jpg)

这个来源文件驱动的页面让团队能迭代文档首页内容，而不需要在同一个版本中迁移功能页或详细文档页。
