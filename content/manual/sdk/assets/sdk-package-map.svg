<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">RTK Cloud SDK package map</title>
  <desc id="desc">Six SDK packages connect device, application, and automation software to shared RTK Cloud services.</desc>
  <defs>
    <style>
      .title{font:700 34px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}.label{font:700 22px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#172033}.small{font:16px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#465064}.box{fill:#f4f8fc;stroke:#9cb6ce;stroke-width:2}.cloud{fill:#0068b5}.cloudtext{font:700 28px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;fill:#fff}.line{stroke:#4b86b4;stroke-width:4;fill:none}
    </style>
  </defs>
  <rect width="1200" height="520" rx="24" fill="#fff"/>
  <text class="title" x="48" y="58">One client contract, six platform packages</text>
  <rect class="cloud" x="420" y="202" width="360" height="118" rx="28"/>
  <text class="cloudtext" x="600" y="252" text-anchor="middle">RTK Cloud services</text>
  <text class="cloudtext" x="600" y="288" text-anchor="middle">auth - device - media</text>
  <path class="line" d="M250 150 L450 220 M600 150 L600 202 M950 150 L750 220 M250 390 L450 300 M600 390 L600 320 M950 390 L750 300"/>
  <g transform="translate(70 90)"><rect class="box" width="360" height="94" rx="18"/><text class="label" x="22" y="38">Native C/C++</text><text class="small" x="22" y="68">Embedded Linux and native devices</text></g>
  <g transform="translate(420 90)"><rect class="box" width="360" height="94" rx="18"/><text class="label" x="22" y="38">Android Kotlin</text><text class="small" x="22" y="68">Product apps and Media3 playback</text></g>
  <g transform="translate(770 90)"><rect class="box" width="360" height="94" rx="18"/><text class="label" x="22" y="38">iOS Swift</text><text class="small" x="22" y="68">Product apps and AVPlayer</text></g>
  <g transform="translate(70 356)"><rect class="box" width="360" height="94" rx="18"/><text class="label" x="22" y="38">JavaScript/TypeScript</text><text class="small" x="22" y="68">Browser and Node.js integrations</text></g>
  <g transform="translate(420 356)"><rect class="box" width="360" height="94" rx="18"/><text class="label" x="22" y="38">Go</text><text class="small" x="22" y="68">Devices, CI, and automation</text></g>
  <g transform="translate(770 356)"><rect class="box" width="360" height="94" rx="18"/><text class="label" x="22" y="38">FreeRTOS/Pro2</text><text class="small" x="22" y="68">Camera firmware integration</text></g>
</svg>
