{{define "layout"}}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}}</title>
  <meta name="description" content="{{.MetaDescription}}">
  <link rel="canonical" href="{{.CanonicalURL}}">
  <meta property="og:site_name" content="Realtek Connect+">
  <meta property="og:type" content="website">
  <meta property="og:title" content="{{.Title}}">
  <meta property="og:description" content="{{.MetaDescription}}">
  <meta property="og:url" content="{{.CanonicalURL}}">
  <meta property="og:image" content="{{.SocialImageURL}}">
  <meta property="og:image:alt" content="{{.SocialImageAlt}}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{.Title}}">
  <meta name="twitter:description" content="{{.MetaDescription}}">
  <meta name="twitter:image" content="{{.SocialImageURL}}">
  <meta name="twitter:image:alt" content="{{.SocialImageAlt}}">
  {{if .MetaRobots}}<meta name="robots" content="{{.MetaRobots}}">{{end}}
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Skip to main content</a>
  <header class="site-header">
    <a class="brand" href="/" aria-label="Realtek Connect+ home">
      <span class="brand-mark">Realtek</span>
      <span class="brand-divider"></span>
      <span class="brand-product">Connect+</span>
    </a>
    <nav class="main-nav" aria-label="Main navigation">
      <a href="/docs">Docs</a>
      <a href="/features">Features</a>
      <a href="/#architecture">Architecture</a>
      <a href="/contact" class="nav-cta">Contact</a>
    </nav>
  </header>

  <main id="main-content" tabindex="-1">
    {{template "content" .}}
  </main>

  <footer class="site-footer">
    <div>
      <strong>Realtek Connect+</strong>
      <p>IoT cloud platform concept for Realtek-based connected products.</p>
    </div>
    <div class="footer-links">
      <a href="/docs">Developer Docs</a>
      <a href="/features">Features</a>
      <a href="/contact">Contact Sales</a>
    </div>
  </footer>
</body>
</html>
{{end}}
