name: Native Release Bundle

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version. Defaults to tag name or short SHA."
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  package:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    name: Package release
    runs-on: [self-hosted, rtk_cloud_frontend, go]
    steps:
      - name: Reset self-hosted workspace
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Select version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            version="$INPUT_VERSION"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            version="$GITHUB_REF_NAME"
          else
            version="${GITHUB_SHA::12}"
          fi
          case "$version" in
            *[!A-Za-z0-9._-]* | "" | .* | *..*)
              echo "invalid version: use only letters, digits, dot, underscore, and dash" >&2
              exit 1
              ;;
          esac
          printf 'version=%s\n' "$version" >> "$GITHUB_OUTPUT"

      - name: Check Go toolchain
        run: go version

      - name: Check Go formatting
        shell: bash
        run: |
          files="$(git ls-files '*.go')"
          unformatted="$(gofmt -l $files)"
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Build native release bundle
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SEARCH_EMBEDDING_MODEL: text-embedding-3-small
        run: |
          chmod +x deploy/*.sh
          deploy/package.sh "${{ steps.version.outputs.version }}"

      - name: Verify native release bundle
        run: deploy/check-release.sh "dist/realtek-connect-${{ steps.version.outputs.version }}"

      - name: Summarize native bundle scope
        shell: bash
        run: |
          {
            echo "Built native Realtek Connect+ bundle."
            echo
            echo "This bundle is for GitHub Releases, diagnostics, or non-K8s recovery use."
            echo "Official LKE runtime image artifacts are produced from rtk_cloud_workspace via .github/workflows/lke-image-artifacts.yml and exported as LKE_FRONTEND_IMAGE."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "$VERSION" >/dev/null 2>&1; then
            gh release upload "$VERSION" \
              "dist/realtek-connect-$VERSION.tar.gz" \
              "dist/realtek-connect-$VERSION.tar.gz.sha256" \
              "dist/realtek-connect-$VERSION.object-manifest.json" \
              --clobber
          else
            gh release create "$VERSION" \
              "dist/realtek-connect-$VERSION.tar.gz" \
              "dist/realtek-connect-$VERSION.tar.gz.sha256" \
              "dist/realtek-connect-$VERSION.object-manifest.json" \
              --generate-notes \
              --target "$GITHUB_SHA" \
              --title "$VERSION"
          fi

  publish-image:
    name: Publish LKE image
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Select image tags
        id: image
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          image="ghcr.io/${GITHUB_REPOSITORY}/frontend"
          short_sha="${GITHUB_SHA::12}"
          tags=("$image:sha-$short_sha")
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            tags+=("$image:$GITHUB_REF_NAME")
          elif [[ -n "${INPUT_VERSION:-}" ]]; then
            tags+=("$image:$INPUT_VERSION")
          fi
          {
            printf 'image=%s\n' "$image"
            printf 'short_sha=%s\n' "$short_sha"
            printf 'tags<<EOF\n'
            printf '%s\n' "${tags[@]}"
            printf 'EOF\n'
          } >> "$GITHUB_OUTPUT"

      - name: Build smoke image
        shell: bash
        run: |
          set -euo pipefail
          docker build -t "${{ steps.image.outputs.image }}:local-smoke" -f Dockerfile .
          docker run --rm --entrypoint /bin/sh "${{ steps.image.outputs.image }}:local-smoke" -c \
            'test -x /app/realtek-connect && test -d /app/content && test -d /app/templates && test -d /app/static'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Write image manifest
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p .artifacts/lke-image
          cat > .artifacts/lke-image/image-manifest.json <<JSON
          {
            "schema": "rtk-service-image/v1",
            "repository": "${GITHUB_REPOSITORY}",
            "image": "${{ steps.image.outputs.image }}",
            "source_commit": "${GITHUB_SHA}",
            "primary_tag": "sha-${{ steps.image.outputs.short_sha }}"
          }
          JSON
          {
            echo "## LKE image"
            echo
            echo "\`\`\`json"
            cat .artifacts/lke-image/image-manifest.json
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload image manifest
        uses: actions/upload-artifact@v4
        continue-on-error: true
        with:
          name: image-manifest
          path: .artifacts/lke-image/image-manifest.json
          if-no-files-found: error
