name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: realtek-connect-cd
  cancel-in-progress: false

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main
  PUBLIC_BASE_URL: https://webtest.mgmeet.io

jobs:
  deploy:
    runs-on: [self-hosted, rtk_cloud_frontend, go, cd, website-test]

    steps:
      - name: Reset self-hosted workspace
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify video asset
        shell: bash
        run: |
          test "$(wc -c < static/assets/realtek-brand-film.mp4)" -gt 1000000

      - name: Check Go toolchain
        run: go version

      - name: Check Go formatting
        shell: bash
        run: |
          files="$(git ls-files '*.go')"
          unformatted="$(gofmt -l $files)"
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run tests
        run: go test ./...

      - name: Check public copy
        shell: bash
        run: |
          if grep -R -n -E 'RainMaker|Rainmaker|rainmaker' . \
            --exclude-dir=.git \
            --exclude-dir=.github \
            --exclude='*.db'; then
            echo "Unexpected competitor name found in repository copy"
            exit 1
          fi

      - name: Build deployment bundle
        shell: bash
        run: |
          rm -rf dist
          mkdir -p dist/bin dist/data
          chmod 0777 dist/data
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -o dist/bin/realtek-connect ./cmd/server
          cp -R templates static dist/
          test -x dist/bin/realtek-connect
          test -d dist/data
          test -w dist/data

      - name: Deploy on website test host
        shell: bash
        run: |
          test -x /usr/local/sbin/deploy-realtek-connect
          set +e
          tar -C dist -czf - bin templates static data | sudo /usr/local/sbin/deploy-realtek-connect
          deploy_status=$?
          set -e

          if [ "$deploy_status" -eq 0 ]; then
            exit 0
          fi

          service_name="realtek-connect.service"
          recent_logs="$(sudo journalctl -u "$service_name" -n 80 --no-pager || true)"
          echo "$recent_logs"
          if ! grep -E "mkdir data: permission denied|unable to open database file" <<<"$recent_logs"; then
            exit "$deploy_status"
          fi

          working_dir="$(systemctl show "$service_name" --property=WorkingDirectory --value)"
          service_user="$(systemctl show "$service_name" --property=User --value)"
          service_group="$(systemctl show "$service_name" --property=Group --value)"

          if [ -n "$working_dir" ] && [ "$working_dir" != "/" ] && [ -n "$service_user" ]; then
            if [ -z "$service_group" ]; then
              service_group="$service_user"
            fi

            sudo install -d -o "$service_user" -g "$service_group" -m 0750 "$working_dir/data"
            sudo systemctl restart "$service_name"

            for _ in $(seq 1 20); do
              if curl -k -fsS --max-time 5 http://127.0.0.1/healthz; then
                exit 0
              fi
              sleep 0.5
            done
          fi

          exit "$deploy_status"

      - name: Verify public deployment
        shell: bash
        run: |
          curl -k -fsS --max-time 20 "${PUBLIC_BASE_URL}/healthz" | grep -qx "ok"
          curl -k -fsS --max-time 20 "${PUBLIC_BASE_URL}/" > /tmp/realtek-connect-home.html
          grep -q "Realtek Connect" /tmp/realtek-connect-home.html
          grep -q "Contact Us" /tmp/realtek-connect-home.html
          curl -k -fsSI --max-time 20 "${PUBLIC_BASE_URL}/static/assets/realtek-brand-film.mp4" > /tmp/realtek-connect-video.headers
          grep -qi "content-type: video/mp4" /tmp/realtek-connect-video.headers
          awk 'BEGIN { ok = 0 } tolower($1) == "content-length:" && $2 + 0 > 1000000 { ok = 1 } END { exit ok ? 0 : 1 }' /tmp/realtek-connect-video.headers
          if grep -q "Contact Sales" /tmp/realtek-connect-home.html; then
            echo "Unexpected stale Contact Sales copy found in deployed homepage"
            exit 1
          fi
