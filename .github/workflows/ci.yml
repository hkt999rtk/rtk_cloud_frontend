name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

env:
  GIT_CONFIG_COUNT: 1
  GIT_CONFIG_KEY_0: init.defaultBranch
  GIT_CONFIG_VALUE_0: main

jobs:
  verify:
    runs-on: [self-hosted, rtk_cloud_frontend, go]

    steps:
      - name: Reset self-hosted workspace
        shell: bash
        run: |
          find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 -exec rm -rf {} +

      - name: Check out repository
        uses: actions/checkout@v6

      - name: Verify video asset
        id: verify_video_asset
        shell: bash
        run: |
          test "$(wc -c < static/assets/realtek-brand-film.mp4)" -gt 1000000

      - name: Check Go toolchain
        run: go version

      - name: Check Go formatting
        id: gofmt
        shell: bash
        run: |
          files="$(git ls-files '*.go')"
          unformatted="$(gofmt -l $files)"
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run tests
        id: tests
        run: go test -count=1 -timeout=3m ./...

      - name: Build server
        id: build
        run: go build ./cmd/server

      - name: Select CI artifact version
        id: artifact_version
        shell: bash
        run: |
          printf 'version=ci-%s\n' "${GITHUB_SHA::12}" >> "$GITHUB_OUTPUT"

      - name: Build deployable bundle
        id: package
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          SEARCH_EMBEDDING_MODEL: text-embedding-3-small
        run: |
          chmod +x deploy/*.sh
          deploy/package.sh "${{ steps.artifact_version.outputs.version }}"
          deploy/check-release.sh "dist/realtek-connect-${{ steps.artifact_version.outputs.version }}"

      - name: Upload deployable bundle to Linode Object Storage
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/') || github.ref == 'refs/heads/main'
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.LINODE_OBJ_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.LINODE_OBJ_SECRET_ACCESS_KEY }}
          LINODE_TOKEN: ${{ secrets.LINODE_TOKEN }}
          AWS_DEFAULT_REGION: us-sea
          AWS_EC2_METADATA_DISABLED: "true"
          LINODE_OBJ_BUCKET: ${{ vars.LINODE_OBJ_BUCKET }}
          LINODE_OBJ_ENDPOINT: ${{ vars.LINODE_OBJ_ENDPOINT }}
        run: |
          deploy/upload-linode-artifact.sh "${{ steps.artifact_version.outputs.version }}"

      - name: Run visual smoke
        id: visual_smoke
        shell: bash
        run: |
          if command -v google-chrome >/dev/null 2>&1 || command -v chromium >/dev/null 2>&1 || command -v chromium-browser >/dev/null 2>&1; then
            go run ./cmd/visual-smoke
            echo "result=PASS" >> "$GITHUB_OUTPUT"
          else
            echo "Chrome is not available on this runner; recording visual smoke as SKIP."
            echo "result=SKIP" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate CI report candidate
        if: always()
        shell: bash
        env:
          REPORT_ASSET_RESULT: ${{ steps.verify_video_asset.outcome == 'success' && 'PASS' || 'FAIL' }}
          REPORT_GOFMT_RESULT: ${{ steps.gofmt.outcome == 'success' && 'PASS' || 'FAIL' }}
          REPORT_TEST_RESULT: ${{ steps.tests.outcome == 'success' && 'PASS' || 'FAIL' }}
          REPORT_BUILD_RESULT: ${{ steps.build.outcome == 'success' && 'PASS' || 'FAIL' }}
          REPORT_VISUAL_SMOKE_RESULT: ${{ steps.visual_smoke.outputs.result || 'FAIL' }}
        run: |
          chmod +x scripts/generate_report_candidate.sh scripts/validate_report_candidate.sh
          scripts/generate_report_candidate.sh ci .artifacts/report-candidates/docs/TEST_REPORT.md
          scripts/validate_report_candidate.sh .artifacts/report-candidates/docs/TEST_REPORT.md docs/TEST_REPORT.md

      - name: Check CI report drift
        shell: bash
        run: |
          diff -u docs/TEST_REPORT.md .artifacts/report-candidates/docs/TEST_REPORT.md
